name: scooter_aggregator
description: "Yakındaki tüm kiralık scooter'ları tek uygulamada listeleyen agregatör uygulaması"
publish_to: 'none'
version: 0.1.0

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  google_maps_flutter: ^2.6.0
  geolocator: ^11.0.0
  provider: ^6.1.2
  http: ^1.2.1
  intl: ^0.19.0
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
